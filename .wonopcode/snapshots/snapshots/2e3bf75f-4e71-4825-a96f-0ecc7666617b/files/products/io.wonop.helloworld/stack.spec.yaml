frontend:
  ssr: false
  build_type: "Bazel"
  location: "frontend/webui"
  color: "purple"
  mount_point: "/"
  k8s: frontend/infrastructure
  # Bazel OCI configuration
  oci_image_target: "//src:image"
  oci_load_target: "//src:load"
  oci_push_target: "//src:push"
  depends_on:
    - backend

