# Example stack configuration with local services

# PostgreSQL database service (persistent)
postgres:
  build_type:
    LocalService:
      service_type: postgresql
      persist_data: true
      ports:
        - "5432:5432"
      env:
        POSTGRES_USER: testuser
        POSTGRES_PASSWORD: testpass
        POSTGRES_DB: testdb
      health_check: "pg_isready -U testuser"
      init_scripts:
        - "echo 'Database initialized'"

# Redis cache service (persistent)  
redis:
  build_type:
    LocalService:
      service_type: redis
      persist_data: true
      ports:
        - "6379:6379"
      health_check: "redis-cli ping"

# MinIO S3-compatible storage (persistent)
minio:
  build_type:
    LocalService:
      service_type: minio
      persist_data: true
      ports:
        - "9000:9000"
        - "9001:9001"
      env:
        MINIO_ROOT_USER: minioadmin
        MINIO_ROOT_PASSWORD: minioadmin
      health_check: "curl -f http://localhost:9000/minio/health/live"

# Example application that uses the local services
app:
  build_type:
    RustBinary:
      location: ./app
      dockerfile_path: ./app/Dockerfile
  port: 8080
  target_port: 8080
  env:
    # These will be overridden by connection strings from LocalServiceManager
    DATABASE_URL: "will be set automatically"
    REDIS_URL: "will be set automatically"
    S3_ENDPOINT: "will be set automatically"