[package]
name = "rush-cli"
version = "0.0.21"
edition = "2021"
authors = ["Troels F. Rønnow <wonop@wonop.com>"]
description = "Rush Deployment: A tool to bring the development experience as close to the production experience as possible."
license = "MIT"
repository = "https://github.com/wonop-io/rush"
homepage = "https://github.com/wonop-io/rush"
readme = "README.md"
keywords = ["yew", "axum", "docker", "kubernetes", "cross-compilation"]
categories = ["command-line-utilities", "development-tools", "web-programming"]

[[bin]]
name = "rush"
path = "src/main.rs"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
async-trait = "0.1.81"
base64 = "0.22.1"
chrono = "0.4.38"
# tokio-pty-process = "0.4.0"
clap = "4.5.3"
colored = "2.1.0"
console-subscriber = "0.4.0"
dirs = "6.0.0"
dotenv = "0.15.0"
ed25519-dalek = "2.1.1"
env_logger = "0.11.5"
futures = "0.3.30"
glob = "0.3.1"
hex = "0.4.3"
lazy_static = "1.4.0"
log = "0.4.22"
notify = "6.1.1"
openssl = "0.10.66"
rand = "0.8.5"
reqwest = { version = "0.12.7", features = ["json"] }
rpassword = "7.3.1"
semver = "1.0.23"
serde = { version = "1.0.197", features = ["derive"] }
serde_json = "1.0.114"
serde_yaml = "0.9.33"
sha2 = "0.10.8"
slug = "0.1.5"
ssh-key = { version = "0.6.7", features = [
    "alloc",
    "ed25519",
    "dsa",
    "rsa",
    "encryption",
    "getrandom",
    "crypto",
    "p256",
    "p384",
    "p521",
    "serde",
    "tdes",
] }
tera = "1.19.1"
tokio = { version = "1.36.0", features = ["full"] }
tokio-util = "0.7.10"
uuid = { version = "1.10.0", features = ["v4"] }

[dev-dependencies]
ctor = "0.2.6"
serial_test = "3.2.0"
tempfile = "3.12.0"

#[lib]
#name = "rush_cli"
#path = "src/lib.rs"
