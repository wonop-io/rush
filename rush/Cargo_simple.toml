[package]
name = "rush-cli"
version = "0.0.21"
edition = "2021"

[[bin]]
name = "rush"
path = "src/main.rs"

[dependencies]
# All the original dependencies
clap = { version = "4.4", features = ["derive", "env"] }
tokio = { version = "1.35", features = ["full"] }
tokio-util = "0.7.12"
anyhow = "1.0"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
toml = "0.8"
log = "0.4"
env_logger = "0.11"
chrono = "0.4"
regex = "1.10"
glob = "0.3"
walkdir = "2.4"
notify = "6.1"
tempfile = "3.8"
which = "6.0"
directories = "5.0"
sha2 = "0.10"
hex = "0.4"
base64 = "0.21"
bollard = "0.15"
k8s-openapi = { version = "0.20", features = ["v1_28"] }
kube = { version = "0.87", features = ["runtime", "derive"] }
handlebars = "4.5"
tera = "1.19"
indicatif = "0.17"
console = "0.15"
dialoguer = "0.11"
async-trait = "0.1"
futures = "0.3"

[dev-dependencies]
tempfile = "3.8"
tokio-test = "0.4"

[lib]
name = "rush_cli"
path = "src/lib.rs"