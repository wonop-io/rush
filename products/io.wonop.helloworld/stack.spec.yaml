frontend:
  ssr: false
  build_type: "TrunkWasm"
  location: "frontend/webui"
  dockerfile: "frontend/Dockerfile"
  color: "purple"
  mount_point: "/"
  k8s: frontend/infrastructure

backend:
  build_type: "RustBinary"
  location: "backend/server"
  context_dir: "."
  dockerfile: "backend/Dockerfile"
  color: "blue"
  mount_point: "/api"
  k8s: backend/infrastructure
  priority: 50

database:
  build_type: "LocalService"
  service_type: "postgresql"
  version: "16"
  color: "yellow"
  persist_data: true
  env:
    POSTGRES_DB: backend
    POSTGRES_PASSWORD: admin
    POSTGRES_USER: admin
    POSTGRES_PORT: "5432"
  health_check: "pg_isready -U admin -p 5432"
  init_scripts:
    - "echo 'Database initialized for backend service'"

stripe:
  build_type: "LocalService"
  service_type: "stripe-cli"
  color: "orange"
  persist_data: false
  env:
    STRIPE_WEBHOOK_URL: "http://localhost:8080/api/stripe/webhook"
  command: "listen --forward-to http://localhost:8080/api/stripe/webhook"

ingress:
  build_type: "Ingress"
  port: 9000
  target_port: 80
  location: "./ingress"
  context_dir: ../target
  dockerfile: "./ingress/Dockerfile"
  color: "green"
  components:
    - "backend"
    - "frontend"
